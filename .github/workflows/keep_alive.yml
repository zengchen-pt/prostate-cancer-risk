name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'      # 每 10 分钟自动跑一次
  workflow_dispatch:             # 👈 这一行让你可以手动点绿色按钮

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: curl -s -o /dev/null -w "%{http_code}" https://prostate-cancer-risk.onrender.com/predict
